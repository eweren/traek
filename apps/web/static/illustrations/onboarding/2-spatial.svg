<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240" role="img" aria-labelledby="ob2-title ob2-desc">
  <title id="ob2-title">Navigate the spatial canvas</title>
  <desc id="ob2-desc">A Traek canvas showing multiple nodes with pan and zoom gesture indicators and a minimap in the corner</desc>
  <defs>
    <pattern id="ob2-grid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" class="dot"/>
    </pattern>
    <marker id="ob2-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0.5 L6,3.5 L0,6.5" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="arrow-mark"/>
    </marker>
    <radialGradient id="ob2-vignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <style>
      .bg          { fill: #0b0b0b; }
      .dot         { fill: #2c2c2c; }
      .node        { fill: #161616; stroke: #2a2a2a; stroke-width: 1; }
      .node-active { fill: #161616; stroke: #00d8ff; stroke-width: 1.5; }
      .bar-cyan    { fill: #00d8ff; }
      .bar-ora     { fill: #ff3e00; }
      .line-a      { fill: #333; }
      .line-b      { fill: #2a2a2a; }
      .conn        { stroke: #2a2a2a; stroke-width: 1.5; fill: none; stroke-linecap: round; }
      .gesture     { stroke: #00d8ff; stroke-width: 1.5; fill: none; stroke-linecap: round; opacity: 0.7; }
      .arrow-mark  { stroke: #00d8ff; }
      .arrow-path  { stroke: #00d8ff; stroke-width: 1.5; fill: none; stroke-linecap: round; marker-end: url(#ob2-arrow); opacity: 0.7; }
      .zoom-ring   { fill: none; stroke: #00d8ff; stroke-width: 1.5; opacity: 0.5; }
      .zoom-cross  { stroke: #00d8ff; stroke-width: 1.5; stroke-linecap: round; opacity: 0.7; }
      /* Minimap */
      .mm-bg       { fill: #0e0e0e; stroke: #2a2a2a; stroke-width: 1; }
      .mm-node     { fill: #2a2a2a; }
      .mm-viewport { fill: none; stroke: #00d8ff; stroke-width: 1; opacity: 0.6; }
      .vignette    { fill: url(#ob2-vignette); }

      @media (prefers-color-scheme: light) {
        .bg          { fill: #f0f0f0; }
        .dot         { fill: #c8c8c8; }
        .node        { fill: #fff; stroke: #d4d4d4; }
        .node-active { fill: #fff; stroke: #0099cc; }
        .bar-cyan    { fill: #0099cc; }
        .bar-ora     { fill: #e03a00; }
        .line-a      { fill: #e0e0e0; }
        .line-b      { fill: #e8e8e8; }
        .conn        { stroke: #d0d0d0; }
        .gesture     { stroke: #0099cc; }
        .arrow-mark  { stroke: #0099cc; }
        .arrow-path  { stroke: #0099cc; }
        .zoom-ring   { stroke: #0099cc; }
        .zoom-cross  { stroke: #0099cc; }
        .mm-bg       { fill: #f8f8f8; stroke: #ddd; }
        .mm-node     { fill: #d0d0d0; }
        .mm-viewport { stroke: #0099cc; }
        .vignette    { fill: none; }
      }
    </style>
  </defs>

  <!-- Canvas background -->
  <rect width="320" height="240" class="bg"/>
  <rect width="320" height="240" fill="url(#ob2-grid)" opacity="0.55"/>

  <!-- Connection lines -->
  <line x1="160" y1="80" x2="80" y2="138" class="conn"/>
  <line x1="160" y1="80" x2="220" y2="138" class="conn"/>
  <line x1="220" y1="174" x2="270" y2="190" class="conn" opacity="0.5"/>

  <!-- Root node: 100×44, centered at (160, 58) → (110, 36) -->
  <rect x="110" y="36" width="100" height="44" rx="5" class="node-active"/>
  <rect x="110" y="36" width="100" height="2.5" rx="1.25" class="bar-cyan"/>
  <rect x="122" y="48" width="40" height="3" rx="1.5" class="line-a" opacity="0.6"/>
  <rect x="122" y="56" width="62" height="3" rx="1.5" class="line-b" opacity="0.4"/>
  <rect x="122" y="64" width="30" height="3" rx="1.5" class="line-b" opacity="0.3"/>

  <!-- Left child: 90×40, at (35,138) -->
  <rect x="35" y="138" width="90" height="40" rx="4" class="node"/>
  <rect x="35" y="138" width="90" height="2.5" rx="1.25" class="bar-ora"/>
  <rect x="46" y="150" width="36" height="3" rx="1.5" class="line-a" opacity="0.5"/>
  <rect x="46" y="158" width="56" height="3" rx="1.5" class="line-b" opacity="0.35"/>
  <rect x="46" y="166" width="26" height="3" rx="1.5" class="line-b" opacity="0.25"/>

  <!-- Right child: 90×40, at (175,138) -->
  <rect x="175" y="138" width="90" height="40" rx="4" class="node"/>
  <rect x="175" y="138" width="90" height="2.5" rx="1.25" class="bar-cyan"/>
  <rect x="186" y="150" width="38" height="3" rx="1.5" class="line-a" opacity="0.5"/>
  <rect x="186" y="158" width="52" height="3" rx="1.5" class="line-b" opacity="0.35"/>

  <!-- Pan gesture arrow (bottom-center area) -->
  <line x1="130" y1="215" x2="158" y2="215" class="arrow-path" marker-end="url(#ob2-arrow)"/>
  <!-- Pan indicator: double-headed feel -->
  <line x1="130" y1="215" x2="102" y2="215" class="arrow-path" marker-end="url(#ob2-arrow)"/>

  <!-- Zoom gesture (+ ring, top-left) -->
  <circle cx="50" cy="66" r="12" class="zoom-ring"/>
  <!-- Plus inside ring -->
  <line x1="44" y1="66" x2="56" y2="66" class="zoom-cross"/>
  <line x1="50" y1="60" x2="50" y2="72" class="zoom-cross"/>

  <!-- Minimap — bottom right corner: 58×46 at (248,182) -->
  <rect x="248" y="182" width="58" height="46" rx="4" class="mm-bg"/>
  <!-- Minimap dots (node representations) -->
  <rect x="268" y="189" width="18" height="8" rx="1.5" class="mm-node" opacity="0.7"/>
  <rect x="254" y="204" width="14" height="7" rx="1.5" class="mm-node" opacity="0.5"/>
  <rect x="276" y="204" width="14" height="7" rx="1.5" class="mm-node" opacity="0.5"/>
  <!-- Viewport indicator -->
  <rect x="255" y="186" width="44" height="38" rx="2" class="mm-viewport"/>

  <!-- Subtle vignette -->
  <rect width="320" height="240" class="vignette"/>
</svg>
