name: Bug Report
description: Report a bug or unexpected behavior in træk
title: '[bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: træk version
      description: Run `npm list traek` to find your version
      placeholder: e.g. 0.3.1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Link to a minimal reproduction (StackBlitz, CodeSandbox, or a GitHub repo), or paste the smallest snippet that shows the issue.
      placeholder: https://stackblitz.com/...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what applies.
      value: |
        - Browser:
        - OS:
        - Framework adapter (if using @traek/react or @traek/vue):
      render: markdown
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Console errors, screenshots, or anything else that may help.
    validations:
      required: false
