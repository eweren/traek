name: Feature Request
description: Propose a new feature or improvement
title: '[feat] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check [GitHub Discussions](https://github.com/gettraek/traek/discussions) to see if this has already been discussed. If so, add a 👍 there rather than opening a duplicate.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point that motivates this request.
      placeholder: "When I try to do X, I can't because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see. Include API sketches or mockups if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why are they insufficient?
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to implement this?
      options:
        - label: Yes, I'd like to submit a PR for this feature
